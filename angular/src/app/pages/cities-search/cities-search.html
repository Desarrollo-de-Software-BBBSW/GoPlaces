<div class="d-flex justify-content-between align-items-center mb-3">
  <h2>Buscar ciudades</h2>
</div>

<div class="container mt-4">
  <div class="card shadow">
    <div class="card-body">

      <form [formGroup]="searchForm" (ngSubmit)="search()">
        <div class="row g-3 mb-3">

          <!-- Nombre de la ciudad -->
          <div class="col-12 col-md-6">
            <label class="form-label" for="partialName">Nombre de la ciudad <span class="text-danger">*</span></label>
            <input
              type="text"
              class="form-control"
              id="partialName"
              formControlName="partialName"
              placeholder="Ej: Buenos Aires (mínimo 3 caracteres)">
          </div>

          <!-- Código de país -->
          <div class="col-12 col-md-2">
            <label class="form-label" for="countryCode">País (código ISO)</label>
            <input
              type="text"
              class="form-control"
              id="countryCode"
              formControlName="countryCode"
              placeholder="Ej: AR, US, ES"
              maxlength="3">
          </div>

          <!-- Región -->
          <div class="col-12 col-md-2">
            <label class="form-label" for="regionId">Región (código)</label>
            <input
              type="text"
              class="form-control"
              id="regionId"
              formControlName="regionId"
              placeholder="Ej: BA, NY">
          </div>

          <!-- Población mínima -->
          <div class="col-12 col-md-2">
            <label class="form-label" for="minPopulation">Población mínima</label>
            <input
              type="number"
              class="form-control"
              id="minPopulation"
              formControlName="minPopulation"
              placeholder="Ej: 100000"
              min="0">
          </div>

        </div>

        <!-- Botón de búsqueda -->
        <div class="d-flex align-items-center gap-2">
          <button type="submit" class="btn btn-primary" [disabled]="isLoading">
            <i *ngIf="isLoading" class="fa fa-spinner fa-spin me-1"></i>
            <i *ngIf="!isLoading" class="fa fa-search me-1"></i>
            Buscar
          </button>
          <button type="button" class="btn btn-outline-secondary" (click)="searchForm.reset(); cities = []; errorMessage = null">
            Limpiar
          </button>
        </div>

      </form>

      <hr>

      <!-- Mensaje de error -->
      <div *ngIf="errorMessage" class="alert alert-danger mt-3" role="alert">
        <strong>Error:</strong> {{ errorMessage }}
      </div>

      <!-- Resultados -->
      <div *ngIf="cities.length > 0 && !isLoading" class="mt-3">
        <h5>Resultados encontrados ({{ cities.length }})</h5>

        <div class="table-responsive shadow-sm" style="max-height: 300px; overflow-y: auto; border: 1px solid #dee2e6; border-radius: 5px;">
          <table class="table table-striped table-hover mb-0">
            <thead style="position: sticky; top: 0; background-color: #f8f9fa; z-index: 1; box-shadow: 0 2px 2px -1px rgba(0,0,0,0.1);">
              <tr>
                <th style="width: 35%;">Nombre</th>
                <th style="width: 25%;">País</th>
                <th class="text-center" style="width: 40%;">Acción</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let city of cities">
                <td class="align-middle fw-bold">{{ city.name }}</td>
                <td class="align-middle">{{ city.country }}</td>
                <td class="text-center align-middle">
                  <div class="d-flex justify-content-center gap-2">
                    <button
                      class="btn btn-success btn-sm text-nowrap"
                      (click)="saveCity(city)"
                      title="Guardar en mis destinos">
                      💾 Guardar
                    </button>
                    <a
                      class="btn btn-primary btn-sm text-nowrap"
                      [routerLink]="['/cities', city.id]"
                      title="Ver detalles y opiniones">
                      👁️ Ir
                    </a>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>

      <!-- Sin resultados -->
      <div *ngIf="!cities.length && searchForm.get('partialName')?.value && !isLoading && !errorMessage" class="alert alert-info mt-3">
        No se encontraron ciudades con los filtros aplicados.
      </div>

    </div>
  </div>
</div>
